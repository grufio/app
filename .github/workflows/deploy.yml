## Production deploy workflow
#
# Responsibilities:
# - Replace the manual `supabase db push --linked` step from the release checklist.
# - Apply DB migrations to prod behind a required-reviewer environment gate.
# - Trigger Vercel production deploy exactly once per push (after migrations succeed,
#   or immediately if the push contains no migration changes).
#
# Prerequisites (one-time setup, see docs/migrations.md):
# - GitHub Environment `production-db` with required reviewers.
# - Repo secrets: SUPABASE_PROJECT_REF, SUPABASE_DB_PASSWORD, SUPABASE_DB_URL,
#   VERCEL_DEPLOY_HOOK_URL, optional SLACK_ALERT_WEBHOOK_URL.
# - Vercel auto-deploy on `main` disabled via "Ignored Build Step: exit 0";
#   prod deploys only happen via the deploy hook triggered here.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Force JS actions onto Node 24 (see ci.yml note).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Serialize deploys per ref. Never cancel a running migration deploy.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Read-only Supabase secrets so the definitive `migration list` check
    # works without going through the production-db approval gate. This
    # job never writes to prod.
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    outputs:
      has-migrations:     ${{ steps.diff.outputs.has-migrations }}
      detect-reason:      ${{ steps.diff.outputs.reason }}
      has_frontend:       ${{ steps.paths.outputs.has_frontend }}
      has_backend:        ${{ steps.paths.outputs.has_backend }}
      has_filter_service: ${{ steps.paths.outputs.has_filter_service }}
      has_other:          ${{ steps.paths.outputs.has_other }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      # Path categories for the frontend-only-vs-skip decision (Vercel
      # hook gating). Orthogonal to the Supabase-CLI pending-migration
      # check below — that one fires on outstanding-prod-state, this
      # one decides whether the Vercel build is even needed.
      - id: paths
        uses: ./.github/actions/detect-paths

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.98.2

      - name: Detect migration changes
        id: diff
        run: |
          # Manual trigger always runs the migration path so an operator can
          # re-deploy after a transient failure without a no-op commit.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has-migrations=true" >> "$GITHUB_OUTPUT"
            echo "reason=workflow_dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fast-path 1: this commit added/changed a migration file. Always
          # run the migration job in that case, no Supabase round-trip needed.
          if git diff --name-only HEAD~1..HEAD 2>/dev/null | grep -qE '^supabase/migrations/'; then
            echo "has-migrations=true" >> "$GITHUB_OUTPUT"
            echo "reason=migration_file_in_diff" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fast-path 2: this commit changed db/schema.sql. Either it's a
          # post-deploy regen (no-op for db push, will exit clean) or a
          # pre-flight-restore PR like #105 (drift fixed, ready to apply
          # outstanding migrations). Either way we want the migration path
          # to run so the pre-flight + push has a chance to act.
          if git diff --name-only HEAD~1..HEAD 2>/dev/null | grep -qE '^db/schema\.sql$'; then
            echo "has-migrations=true" >> "$GITHUB_OUTPUT"
            echo "reason=schema_sql_in_diff" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Definitive check: ask Supabase whether any local migration is
          # not yet applied to prod. Catches the bug class where a PR has
          # zero schema changes but main has outstanding migrations from
          # an earlier failed/cancelled deploy. Without this, those
          # migrations stay buried until someone notices.
          #
          # `supabase migration list --linked` prints a 3-column table
          # (Local | Remote | Time). A row with a Local timestamp but no
          # Remote timestamp = pending. We grep for that pattern.
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" >/dev/null
          listing="$(supabase migration list --linked --password "$SUPABASE_DB_PASSWORD" 2>&1 || true)"
          echo "$listing"
          # Pending row format: leading whitespace, version digits, two
          # whitespace-separated cells where the second (Remote) is empty
          # or just whitespace before the next column separator. Easiest
          # robust signal: `Local` column populated, `Remote` column blank.
          # The CLI uses a `|` separator; a pending row looks like:
          #   "    20260511131636 |                | 2026-05-11 13:16:36"
          if printf '%s\n' "$listing" | grep -qE '^[[:space:]]*[0-9]{14}[[:space:]]*\|[[:space:]]*\|'; then
            echo "has-migrations=true" >> "$GITHUB_OUTPUT"
            echo "reason=outstanding_migrations_on_prod" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has-migrations=false" >> "$GITHUB_OUTPUT"
          echo "reason=no_pending" >> "$GITHUB_OUTPUT"

  migrations:
    needs: detect
    if: needs.detect.outputs.has-migrations == 'true'
    runs-on: ubuntu-latest
    environment: production-db
    timeout-minutes: 30
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      # Account-level token, needed by `supabase link` and any `--linked` CLI
      # call that hits the management API. Distinct from the DB password.
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Pin to the same version the verify:* npm scripts spawn via
      # `npx -y supabase@<version>`. Different minor versions write the
      # linked-project state to slightly different paths, so a `supabase
      # link` from the PATH-installed CLI is not visible to the npx-spawned
      # CLI used by verify:remote-migrations / verify:types-synced.
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.98.2

      - name: Log detect reason
        run: echo "detect reason=${{ needs.detect.outputs.detect-reason }}"

      - name: Require deploy secrets
        run: |
          missing=0
          for var in SUPABASE_PROJECT_REF SUPABASE_DB_PASSWORD SUPABASE_DB_URL SUPABASE_ACCESS_TOKEN; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: $var"
              missing=1
            fi
          done
          [ "$missing" = "0" ]

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Audit — list pending migrations
        run: supabase migration list --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Pre-flight — verify committed schema matches current prod
        run: npm run verify:schema-drift

      - name: Apply pending migrations
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Post-push — verify all migrations applied
        run: npm run verify:remote-migrations

      - name: Post-push — verify generated types match new schema
        env:
          SUPABASE_VERIFY_TYPES_SYNC: "1"
        run: npm run verify:types-synced

      # verify:remote-rls is the only one of the three deploy-time
      # gates that doesn't have a pre-push pairing — RLS policies for
      # a new table only exist AFTER the migration is applied, so
      # pre-push would trip on additive migrations the same way it
      # would on PR-CI. Post-push confirms that the migration created
      # the policies the migration script claims it created. Runs
      # before the Vercel deploy hook so missing RLS blocks the
      # frontend rollout.
      - name: Post-push — verify remote RLS + storage policies
        run: npm run verify:remote-rls

      - name: Trigger Vercel production deploy
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL not set — skipping Vercel trigger."
            exit 0
          fi
          curl -fsSL -X POST "$HOOK" -o /dev/null
          echo "Triggered Vercel production deploy."

      - name: Slack alert on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.SLACK_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            exit 0
          fi
          payload=$(printf '{"text":":rotating_light: Migration deploy failed on `%s` @ `%s`\n%s/%s/actions/runs/%s"}' \
            "${{ github.ref_name }}" "${{ github.sha }}" \
            "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}")
          curl -fsSL -X POST -H 'Content-Type: application/json' -d "$payload" "$WEBHOOK" || true

  frontend-only:
    # Triggers the Vercel hook when this push has no migrations but
    # does touch frontend/backend code (or unclassified paths). Skips
    # for filter-service-only or doc-only pushes — Vercel doesn't
    # rebuild for either.
    needs: detect
    if: |
      needs.detect.outputs.has-migrations == 'false' &&
      (needs.detect.outputs.has_frontend == 'true' ||
       needs.detect.outputs.has_backend == 'true' ||
       needs.detect.outputs.has_other == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Log detect reason
        run: echo "detect reason=${{ needs.detect.outputs.detect-reason }}"

      - name: Trigger Vercel production deploy (no migrations in push)
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL not set — skipping Vercel trigger."
            exit 0
          fi
          curl -fsSL -X POST "$HOOK" -o /dev/null
          echo "Triggered Vercel production deploy (frontend-only path)."
