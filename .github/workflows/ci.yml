## CI workflow
#
# Responsibilities:
# - Run lint/tests and build checks on pull requests and main pushes.
# - Execute Playwright E2E with caching and upload reports as artifacts.
name: CI

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Check local gates (lint + tests + schema markers)
        run: npm run check:local

      - name: Coverage gate
        run: npm run test:coverage:gate

      - name: Check remote DB invariants (optional)
        if: ${{ secrets.SUPABASE_DB_URL != '' }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: npm run check:remote

      # Optional release gates (require secrets + linked Supabase project).
      - name: Verify remote migrations (optional)
        if: ${{ secrets.SUPABASE_DB_PASSWORD != '' }}
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: npm run verify:remote-migrations

      - name: Verify remote RLS + storage policies (optional)
        if: ${{ secrets.SUPABASE_DB_PASSWORD != '' }}
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: npm run verify:remote-rls

      - name: Verify DB types are synced (optional)
        if: ${{ secrets.SUPABASE_DB_PASSWORD != '' }}
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_VERIFY_TYPES_SYNC: "1"
        run: npm run verify:types-synced

  e2e:
    needs: lint_test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: .playwright-browsers
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (Chromium)
        if: ${{ steps.playwright-cache.outputs.cache-hit != 'true' }}
        env:
          PLAYWRIGHT_BROWSERS_PATH: .playwright-browsers
        run: npx -y playwright install --with-deps chromium

      - name: E2E (Playwright)
        env:
          PLAYWRIGHT_USE_WEBSERVER: "1"
          PLAYWRIGHT_WEBSERVER_COMMAND: "npm run start:e2e"
          PLAYWRIGHT_BASE_URL: "http://127.0.0.1:3110"
        run: npm run test:e2e:ci:pr

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright flaky metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-flaky-metrics
          path: playwright-report/flaky-summary.json
          retention-days: 30
