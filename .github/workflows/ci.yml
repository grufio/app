## CI workflow
#
# Responsibilities:
# - Run lint/tests and build checks on pull requests.
# - Execute Playwright E2E with caching and upload reports as artifacts.
name: CI

on:
  pull_request:

# Force JS-based actions onto Node 24 ahead of GitHub's June-2026 default flip.
# Until upload-artifact (and others) ship a release whose runtime is Node 24,
# this env var is the official opt-in path that silences the deprecation
# warning and lets us catch any incompatibility early.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Soft-fail the e2e_visual job until Linux baselines for
  # forms.visual.spec.ts are committed (only chromium-darwin baselines
  # exist today). Flip to "false" in one place when baselines land —
  # see e2e_visual job below.
  E2E_VISUAL_SOFT_FAIL: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # detect inspects which paths a PR touches and exposes the result so
  # downstream jobs can opt out for irrelevant changes. lint_test
  # always runs (markdown sanity, license/Co-Authored-By, etc.); the
  # heavier integration/e2e/remote_verify only fire when their
  # specific path categories are touched.
  #
  # Path detection is delegated to a composite action that's also
  # consumed by deploy.yml, so the regex lives in exactly one place:
  # `.github/actions/detect-paths/action.yml`.
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      has_frontend:       ${{ steps.filter.outputs.has_frontend }}
      has_backend:        ${{ steps.filter.outputs.has_backend }}
      has_db:             ${{ steps.filter.outputs.has_db }}
      has_filter_service: ${{ steps.filter.outputs.has_filter_service }}
      has_ci:             ${{ steps.filter.outputs.has_ci }}
      has_other:          ${{ steps.filter.outputs.has_other }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Need full history so we can diff against the PR base ref.
          fetch-depth: 0

      - id: filter
        uses: ./.github/actions/detect-paths
        with:
          base-ref: ${{ github.event.pull_request.base.ref }}

  lint_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Run CI lane
        run: npm run gate:ci

  # Block PRs that touch supabase/migrations/ without also updating
  # db/schema.sql. Without this gate the post-deploy schema-drift check
  # is the first thing to notice — too late, prod migration already ran.
  # `db/schema.sql` is the canonical snapshot consumed by every other
  # static check (verify:rls, lock-coverage, structural anchors), so
  # letting it go stale silently breaks downstream guards.
  schema_sync_check:
    needs: detect
    if: needs.detect.outputs.has_db == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Require db/schema.sql update alongside migration changes
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          changed=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          echo "Changed files:"
          echo "$changed" | sed 's/^/  /'
          echo "---"

          migration_changed=false
          schema_changed=false
          if echo "$changed" | grep -qE '^supabase/migrations/.+\.sql$'; then
            migration_changed=true
          fi
          if echo "$changed" | grep -qE '^db/schema\.sql$'; then
            schema_changed=true
          fi

          if [ "$migration_changed" = "true" ] && [ "$schema_changed" = "false" ]; then
            echo "::error::Migration file(s) changed but db/schema.sql was not updated."
            echo "After applying the migration locally, run \`npm run db:dump\` and commit"
            echo "the resulting db/schema.sql changes in the same PR. Without this update"
            echo "the post-deploy schema-drift check will fail and downstream verify:* gates"
            echo "(RLS, types, lock coverage) walk over a stale snapshot."
            exit 1
          fi

          echo "OK: migration / schema.sql in sync."

  # filter_service_tests runs the Python pytest suite for the Cloud Run
  # filter-service. Gated on `has_filter_service` so PRs that don't touch
  # filter-service/** skip it. The same pytest command gates the prod
  # deploy (deploy-filter-service.yml) so a red suite can't ship.
  filter_service_tests:
    needs: detect
    if: needs.detect.outputs.has_filter_service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: filter-service
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # Match the runtime in filter-service/Dockerfile.
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest --cov=app --cov-fail-under=70

  # remote_verify holds the optional checks that need a linked Supabase
  # project (Supabase CLI on PATH, `supabase link`, the four verify:* npm
  # scripts that hit the management API + DB). It runs in parallel to
  # lint_test, so the integration/e2e jobs (which only depend on lint_test
  # via `needs:`) start as soon as the offline gate passes — saving ~2 min
  # of wall time per PR vs. the previous serialised flow.
  #
  # Gated on SUPABASE_PROJECT_REF so PR runs without secrets (forks,
  # drafts) skip cleanly.
  remote_verify:
    needs: detect
    runs-on: ubuntu-latest
    # Skip the entire job for fork PRs (where secrets are not exposed) and
    # for PRs that don't touch DB/migrations (path-dispatch from `detect`).
    if: |
      needs.detect.outputs.has_db == 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pin to the version that verify:* npm scripts spawn via npx,
          # otherwise `supabase link` and `npx supabase migration list
          # --linked` use different config dirs and don't share state.
          version: 2.98.2

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Check remote DB invariants
        run: npm run check:remote

      - name: Verify remote migrations
        run: npm run verify:remote-migrations

      # NOTE: verify:remote-rls, verify:types-synced, and
      # verify:schema-drift are intentionally NOT run here. They are
      # all deploy-time guards that compare the committed state against
      # *live* prod, and any PR that introduces a new table / column
      # makes them flag the PR's own changes as drift. The deploy
      # workflow runs all three POST-push (deploy.yml → migrations
      # job), once the new schema is live and the comparison is
      # meaningful. The companion `schema_sync_check` job above blocks
      # PRs that change migrations without regenerating db/schema.sql,
      # so a drifted snapshot can't reach `main` in the first place.

  integration:
    # Integration tests exercise real code paths against a local Supabase.
    # Fires when backend/API/services or DB changes; `has_other` is the
    # conservative fallback when a file matches no category.
    needs: detect
    if: needs.detect.outputs.has_backend == 'true' || needs.detect.outputs.has_db == 'true' || needs.detect.outputs.has_other == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        # ubuntu-latest ships with ~14 GB pre-installed software (.NET,
        # Haskell GHC, Android SDK, CodeQL bundles). The Supabase image
        # tarball (~1.5 GB) plus its extracted docker layers (~3 GB) plus
        # node_modules (~500 MB) plus build caches push us past the
        # default disk limit on cold runs — `docker load` then dies
        # mid-extraction with "no space left on device". Trim the
        # pre-installed bloat we don't use.
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Setup Supabase CLI
        id: setup-supabase
        uses: supabase/setup-cli@v1
        with:
          # Same pin as remote_verify + deploy.yml + drift-check.yml.
          # Local `supabase start` doesn't share state with --linked
          # calls, so the pin isn't strictly required here, but version
          # parity across jobs avoids surprises when CLI behaviour
          # changes between minor releases.
          version: 2.98.2

      # `supabase start` pulls ~10 service container images (~1.5 GB total)
      # on every cold runner. Caching them keeps the integration job to a
      # single full pull whenever supabase/config.toml changes; subsequent
      # runs `docker load` from the cached tarball instead of pulling.
      - name: Resolve Supabase CLI version
        id: supabase-version
        run: echo "version=$(supabase --version | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Cache Supabase Docker images
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/supabase-images.tar
          key: supabase-images-${{ runner.os }}-${{ steps.supabase-version.outputs.version }}-${{ hashFiles('supabase/config.toml') }}

      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/supabase-images.tar

      - name: Run integration tests against local Supabase
        run: npm run test:integration:ci

      - name: Save Docker images for next run
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          # Snapshot every image `supabase start` pulled. The grep tolerates
          # both `public.ecr.aws/supabase/...` and the legacy `supabase/...`
          # repository prefixes.
          imgs=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E 'supabase|postgres|kong|gotrue|postgrest|imgproxy|inbucket|edge-runtime|logflare|vector|realtime|studio|pg_meta|pg-meta' || true)
          if [ -n "$imgs" ]; then
            docker save $imgs -o /tmp/supabase-images.tar
            echo "Cached $(echo "$imgs" | wc -l) image(s) to /tmp/supabase-images.tar ($(du -h /tmp/supabase-images.tar | cut -f1))"
          else
            echo "No matching images found to cache" >&2
            exit 1
          fi

  e2e:
    # Playwright runs against a real webserver build. Skipped when only
    # docs/CI/DB-migrations change; e2e signals are tied to user-visible
    # behaviour which any frontend or backend change can affect.
    # `has_other` is the conservative fallback for unclassified paths.
    needs: detect
    if: needs.detect.outputs.has_frontend == 'true' || needs.detect.outputs.has_backend == 'true' || needs.detect.outputs.has_other == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: .playwright-browsers
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (Chromium)
        if: ${{ steps.playwright-cache.outputs.cache-hit != 'true' }}
        env:
          PLAYWRIGHT_BROWSERS_PATH: .playwright-browsers
        run: npx -y playwright install --with-deps chromium

      - name: E2E (Playwright)
        env:
          PLAYWRIGHT_USE_WEBSERVER: "1"
          PLAYWRIGHT_WEBSERVER_COMMAND: "npm run start:e2e"
          PLAYWRIGHT_BASE_URL: "http://127.0.0.1:3110"
        run: npm run test:e2e:ci:pr

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright flaky metrics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-flaky-metrics
          path: playwright-report/flaky-summary.json
          retention-days: 30

  # Visual-regression Playwright run (forms.visual.spec.ts). Path-gated
  # on `frontend` so pure logic/services PRs skip it. Replaces the manual
  # visual step that used to live in pre-release.yml.
  e2e_visual:
    needs: detect
    if: needs.detect.outputs.has_frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: .playwright-browsers
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (Chromium)
        if: ${{ steps.playwright-cache.outputs.cache-hit != 'true' }}
        env:
          PLAYWRIGHT_BROWSERS_PATH: .playwright-browsers
        run: npx -y playwright install --with-deps chromium

      - name: E2E visual (forms.visual.spec.ts)
        # Soft-fail gated on E2E_VISUAL_SOFT_FAIL (workflow-level env).
        # Currently "true" because only chromium-darwin baselines exist
        # under e2e/forms.visual.spec.ts-snapshots/, and CI runs on
        # linux, so every test reports "snapshot doesn't exist". Once
        # linux baselines land (run `npm run test:e2e:visual:update`
        # in a Linux container, commit the new snapshot files), flip
        # E2E_VISUAL_SOFT_FAIL to "false" at the top of this workflow.
        continue-on-error: ${{ env.E2E_VISUAL_SOFT_FAIL == 'true' }}
        run: npm run test:e2e:visual

      - name: Upload Playwright visual report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-visual-report
          path: playwright-report/
          retention-days: 7
