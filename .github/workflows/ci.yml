## CI workflow
#
# Responsibilities:
# - Run lint/tests and build checks on pull requests and main pushes.
# - Execute Playwright E2E with caching and upload reports as artifacts.
name: CI

on:
  pull_request:
  push:
    branches: [ main ]

# Force JS-based actions onto Node 24 ahead of GitHub's June-2026 default flip.
# Until upload-artifact (and others) ship a release whose runtime is Node 24,
# this env var is the official opt-in path that silences the deprecation
# warning and lets us catch any incompatibility early.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # detect inspects which paths a PR/push touches and exposes the result
  # so downstream jobs can opt out for irrelevant changes. lint_test
  # always runs (markdown sanity, license/Co-Authored-By, etc.); the
  # heavier integration/e2e/remote_verify only fire when the change
  # touches code, DB, or both.
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      has_code: ${{ steps.filter.outputs.has_code }}
      has_db:   ${{ steps.filter.outputs.has_db }}
      has_docs: ${{ steps.filter.outputs.has_docs }}
      has_ci:   ${{ steps.filter.outputs.has_ci }}
      has_ui:   ${{ steps.filter.outputs.has_ui }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Need full history so we can diff against the PR base ref
          # (or the previous main commit on push events).
          fetch-depth: 0

      - id: filter
        name: Compute changed-path flags via git diff
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.event.pull_request.base.ref }}"
          else
            BASE="HEAD~1"
          fi

          if FILES=$(git diff --name-only "$BASE..HEAD" 2>/dev/null); then
            echo "Comparing against $BASE"
          else
            echo "::warning::could not diff against $BASE — treating all files as changed"
            FILES=$(git ls-files)
          fi

          echo "Changed files:"
          echo "$FILES" | sed 's/^/  /'
          echo "---"

          # A category matches if any line of $FILES matches the regex.
          match() { echo "$FILES" | grep -qE "$1"; }

          has_docs=false; match '^docs/|^[^/]+\.md$|^CLAUDE\.md$'                                                && has_docs=true
          has_db=false;   match '^supabase/migrations/|^supabase/config\.toml$|^db/|^lib/supabase/database\.types\.ts$' && has_db=true
          has_ci=false;   match '^\.github/|^scripts/'                                                            && has_ci=true
          has_ui=false;   match '^components/|^features/|^app/.+\.tsx$|^app/.+\.css$|^lib/forms/|^lib/ui/'        && has_ui=true
          has_code=false; match '^app/|^lib/|^services/|^features/|^components/|^tests/|^e2e/|^package.*\.json$|^[^/]+\.config\.(ts|mjs)$' && has_code=true

          {
            echo "has_docs=$has_docs"
            echo "has_db=$has_db"
            echo "has_ci=$has_ci"
            echo "has_ui=$has_ui"
            echo "has_code=$has_code"
          } >> "$GITHUB_OUTPUT"

          echo "Outputs: docs=$has_docs db=$has_db ci=$has_ci ui=$has_ui code=$has_code"

  lint_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Run CI lane
        run: npm run gate:ci

  # remote_verify holds the optional checks that need a linked Supabase
  # project (Supabase CLI on PATH, `supabase link`, the four verify:* npm
  # scripts that hit the management API + DB). It runs in parallel to
  # lint_test, so the integration/e2e jobs (which only depend on lint_test
  # via `needs:`) start as soon as the offline gate passes — saving ~2 min
  # of wall time per PR vs. the previous serialised flow.
  #
  # Gated on SUPABASE_PROJECT_REF so PR runs without secrets (forks,
  # drafts) skip cleanly.
  remote_verify:
    needs: detect
    runs-on: ubuntu-latest
    # Skip the entire job for fork PRs (where secrets are not exposed) and
    # for PRs that don't touch DB/migrations (path-dispatch from `detect`).
    if: |
      needs.detect.outputs.has_db == 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pin to the version that verify:* npm scripts spawn via npx,
          # otherwise `supabase link` and `npx supabase migration list
          # --linked` use different config dirs and don't share state.
          version: 2.98.2

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Check remote DB invariants
        run: npm run check:remote

      - name: Verify remote migrations
        run: npm run verify:remote-migrations

      # NOTE: verify:remote-rls, verify:types-synced, and
      # verify:schema-drift are intentionally NOT run here. They are
      # all deploy-time guards that compare the committed state against
      # *live* prod, and any PR that introduces a new table / column
      # makes them flag the PR's own changes as drift. The deploy
      # workflow (deploy.yml → migrations job) runs them AROUND the
      # actual `supabase db push` (pre-flight + post-push), which is
      # where the comparison is meaningful — by then the migration is
      # either about to be applied or has just landed. Running them
      # here only catches "someone hand-edited prod via Studio", which
      # is also caught by the deploy.yml pre-flight on the next push.

  integration:
    # Integration tests exercise real code paths against a local Supabase.
    # Skipped when neither code nor DB changes (pure docs/CI PRs).
    needs: detect
    if: needs.detect.outputs.has_code == 'true' || needs.detect.outputs.has_db == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        # ubuntu-latest ships with ~14 GB pre-installed software (.NET,
        # Haskell GHC, Android SDK, CodeQL bundles). The Supabase image
        # tarball (~1.5 GB) plus its extracted docker layers (~3 GB) plus
        # node_modules (~500 MB) plus build caches push us past the
        # default disk limit on cold runs — `docker load` then dies
        # mid-extraction with "no space left on device". Trim the
        # pre-installed bloat we don't use.
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Setup Supabase CLI
        id: setup-supabase
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # `supabase start` pulls ~10 service container images (~1.5 GB total)
      # on every cold runner. Caching them keeps the integration job to a
      # single full pull whenever supabase/config.toml changes; subsequent
      # runs `docker load` from the cached tarball instead of pulling.
      - name: Resolve Supabase CLI version
        id: supabase-version
        run: echo "version=$(supabase --version | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Cache Supabase Docker images
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/supabase-images.tar
          key: supabase-images-${{ runner.os }}-${{ steps.supabase-version.outputs.version }}-${{ hashFiles('supabase/config.toml') }}

      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/supabase-images.tar

      - name: Run integration tests against local Supabase
        run: npm run test:integration:ci

      - name: Save Docker images for next run
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          # Snapshot every image `supabase start` pulled. The grep tolerates
          # both `public.ecr.aws/supabase/...` and the legacy `supabase/...`
          # repository prefixes.
          imgs=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E 'supabase|postgres|kong|gotrue|postgrest|imgproxy|inbucket|edge-runtime|logflare|vector|realtime|studio|pg_meta|pg-meta' || true)
          if [ -n "$imgs" ]; then
            docker save $imgs -o /tmp/supabase-images.tar
            echo "Cached $(echo "$imgs" | wc -l) image(s) to /tmp/supabase-images.tar ($(du -h /tmp/supabase-images.tar | cut -f1))"
          else
            echo "No matching images found to cache" >&2
            exit 1
          fi

  e2e:
    # Playwright runs against a real webserver build. Skipped when only
    # docs/CI/DB-migrations change; e2e signals are tied to user-visible
    # behaviour which only frontend code can affect.
    needs: detect
    if: needs.detect.outputs.has_code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: .playwright-browsers
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (Chromium)
        if: ${{ steps.playwright-cache.outputs.cache-hit != 'true' }}
        env:
          PLAYWRIGHT_BROWSERS_PATH: .playwright-browsers
        run: npx -y playwright install --with-deps chromium

      - name: E2E (Playwright)
        env:
          PLAYWRIGHT_USE_WEBSERVER: "1"
          PLAYWRIGHT_WEBSERVER_COMMAND: "npm run start:e2e"
          PLAYWRIGHT_BASE_URL: "http://127.0.0.1:3110"
        run: npm run test:e2e:ci:pr

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright flaky metrics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-flaky-metrics
          path: playwright-report/flaky-summary.json
          retention-days: 30

  # Visual-regression Playwright run (forms.visual.spec.ts). Path-gated
  # on `ui` so pure logic/services PRs skip it. Replaces the manual visual
  # step that used to live in pre-release.yml.
  e2e_visual:
    needs: detect
    if: needs.detect.outputs.has_ui == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: .playwright-browsers
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers (Chromium)
        if: ${{ steps.playwright-cache.outputs.cache-hit != 'true' }}
        env:
          PLAYWRIGHT_BROWSERS_PATH: .playwright-browsers
        run: npx -y playwright install --with-deps chromium

      - name: E2E visual (forms.visual.spec.ts)
        run: npm run test:e2e:visual

      - name: Upload Playwright visual report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-visual-report
          path: playwright-report/
          retention-days: 7
