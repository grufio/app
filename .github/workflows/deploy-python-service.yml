name: Deploy Python Service

on:
  push:
    branches: [main]
    paths:
      - "python-service/**"
      - ".github/workflows/deploy-python-service.yml"
  workflow_dispatch: {}

# Each commit is its own deploy; cancel any in-flight builds for older commits.
concurrency:
  group: deploy-python-service-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/115182652281/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@grufio-app.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: grufio-app

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy gruf-python-service \
            --source python-service \
            --region europe-west3 \
            --allow-unauthenticated \
            --port 8001 \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --concurrency 40 \
            --timeout 60s \
            --quiet
