name: Deploy Filter Service

on:
  push:
    branches: [main]
    paths:
      - "filter-service/**"
      - ".github/workflows/deploy-filter-service.yml"
  workflow_dispatch: {}

# Force JS actions onto Node 24 (see ci.yml note).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Each commit is its own deploy; cancel any in-flight builds for older commits.
concurrency:
  group: deploy-filter-service-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      # Gate the deploy on the pytest suite: a red suite must not reach
      # Cloud Run. Same command as the CI `filter_service_tests` job.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run filter-service tests
        working-directory: filter-service
        run: |
          pip install -r requirements-dev.txt
          pytest --cov=app --cov-fail-under=70

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/115182652281/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@grufio-app.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: grufio-app

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy gruf-filter-service \
            --source filter-service \
            --region europe-west3 \
            --allow-unauthenticated \
            --port 8001 \
            --memory 4Gi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 5 \
            --concurrency 1 \
            --timeout 60s \
            --quiet
